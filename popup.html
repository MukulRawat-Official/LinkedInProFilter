<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <!-- HEADER WITH THEME TOGGLE -->
    <div class="header">
      <h2>💼 Linked Job Search Filter</h2>
      <button id="themeToggle" class="theme-btn" title="Toggle Theme">
        🌙
      </button>
    </div>

    <!-- CAREER STREAM TABS -->
    <div class="career-stream-tabs">
      <button type="button" id="tab-btech" class="stream-tab active">
        Tech & SDE
      </button>
      <button type="button" id="tab-finance" class="stream-tab">
        Finance & MBA
      </button>
    </div>

    <div class="form-group" style="margin-bottom: 16px; padding: 0 20px">
      <select id="profileSelect" style="font-weight: 600; margin-bottom: 8px">
        <option value="profile1" class="tech-opt">
          Core Software Engineer
        </option>
        <option value="profile2" class="tech-opt">Backend & Systems</option>
        <option value="profile3" class="tech-opt">Machine Learning & AI</option>
        <option value="profile4" class="tech-opt">Custom Slate</option>
        <option value="profile5" class="finance-opt" style="display: none">
          Investment Banking Analyst
        </option>
        <option value="profile6" class="finance-opt" style="display: none">
          Management Consulting
        </option>
      </select>
      <input
        type="text"
        id="workspaceName"
        placeholder="Rename active workspace..."
      />
    </div>

    <div class="section-card">
      <div class="section-title">Search Precision</div>
      <div class="form-group">
        <input
          type="text"
          id="jobTitle"
          placeholder="Target Role (e.g. Backend Engineer)"
        />
      </div>
      <div class="toggle-row">
        <label
          ><input type="checkbox" id="strictTitle" /> Strict Exact Match</label
        >
      </div>
      <div class="toggle-row">
        <label
          ><input type="checkbox" id="blockAgencies" checked /> Block Staffing
          Agencies</label
        >
      </div>
      <div class="form-group" style="margin-top: 8px">
        <input
          type="text"
          id="location"
          placeholder="Location (e.g. Bengaluru, India)"
        />
      </div>
      <div class="form-group" style="margin-top: 8px">
        <select id="timeFilter">
          <option value="3600">Past 1 Hour</option>
          <option value="21600">Past 6 Hours</option>
          <option value="86400">Past 24 Hours</option>
          <option value="604800" selected>Past Week</option>
        </select>
      </div>
    </div>

    <div class="section-card">
      <div class="section-title">Target Entities</div>
      <div class="scrollable-container">
        <div id="tech-companies-container"></div>
        <div id="finance-companies-container"></div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-title">Logistics & Tiers</div>
      <div class="form-group">
        <div class="checkbox-grid">
          <label class="checkbox-label"
            ><input type="checkbox" value="1" class="workplace-cb" checked />
            On-site</label
          >
          <label class="checkbox-label"
            ><input type="checkbox" value="2" class="workplace-cb" />
            Remote</label
          >
          <label class="checkbox-label"
            ><input type="checkbox" value="3" class="workplace-cb" checked />
            Hybrid</label
          >
        </div>
      </div>
      <div
        class="form-group"
        style="
          margin-top: 14px;
          border-top: 1px solid var(--card-border);
          padding-top: 12px;
        "
      >
        <label
          style="font-size: 11px; font-weight: 600; color: var(--text-muted)"
          >Experience Tier</label
        >
        <div class="checkbox-grid">
          <label class="checkbox-label"
            ><input type="checkbox" value="1" class="exp-cb" />
            Internship</label
          >
          <label class="checkbox-label"
            ><input type="checkbox" value="2" class="exp-cb" /> Entry
            level</label
          >
          <label class="checkbox-label"
            ><input type="checkbox" value="3" class="exp-cb" /> Associate</label
          >
          <label class="checkbox-label"
            ><input type="checkbox" value="4" class="exp-cb" />
            Mid-Senior</label
          >
        </div>
      </div>
    </div>

    <div class="action-bar">
      <div id="status">Settings saved!</div>
      <button class="btn btn-secondary" id="saveBtn">Save</button>
      <button class="btn btn-primary" id="launchBtn">
        Execute Target Search
      </button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
