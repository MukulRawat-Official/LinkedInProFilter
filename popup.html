<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --bg-main: #f4f5f7;
        --bg-card: #ffffff;
        --text-main: #172b4d;
        --text-muted: #5e6c84;
        --border-color: #dfe1e6;
        --accent-color: #0052cc;
        --accent-hover: #003eb3;
        --focus-ring: rgba(0, 82, 204, 0.2);
        --success-color: #00875a;
      }

      body {
        width: 380px;
        max-height: 600px;
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background-color: var(--bg-main);
        color: var(--text-main);
        font-size: 13px;
        overflow-y: auto;
      }

      .header {
        margin-bottom: 16px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .header h2 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        color: var(--text-main);
        letter-spacing: -0.3px;
      }

      .section-card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 14px;
        margin-bottom: 12px;
        box-shadow: 0 1px 3px rgba(9, 30, 66, 0.04);
      }
      .section-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--text-muted);
        font-weight: 700;
        margin-bottom: 12px;
      }

      .form-group {
        margin-bottom: 12px;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 6px;
        color: var(--text-main);
      }

      select,
      input[type="text"] {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border-color);
        border-radius: 5px;
        font-size: 13px;
        box-sizing: border-box;
        transition: all 0.2s ease;
        background-color: #fafbfc;
        color: var(--text-main);
      }
      select:focus,
      input[type="text"]:focus {
        outline: none;
        border-color: var(--accent-color);
        background-color: #fff;
        box-shadow: 0 0 0 3px var(--focus-ring);
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
        padding: 6px;
        background: #fafbfc;
        border-radius: 4px;
        border: 1px solid var(--border-color);
      }
      .toggle-row label {
        margin-bottom: 0;
        font-weight: 500;
        font-size: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        width: 100%;
      }
      .toggle-row input {
        margin-right: 8px;
        accent-color: var(--accent-color);
        width: 14px;
        height: 14px;
      }

      .checkbox-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .checkbox-label {
        display: flex;
        align-items: center;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        color: #344563;
      }
      .checkbox-label input {
        margin-right: 8px;
        accent-color: var(--accent-color);
        cursor: pointer;
      }

      details {
        background: #fafbfc;
        border: 1px solid var(--border-color);
        border-radius: 5px;
        margin-bottom: 6px;
        overflow: hidden;
      }
      summary {
        font-size: 12px;
        font-weight: 600;
        padding: 10px;
        cursor: pointer;
        user-select: none;
        color: var(--text-main);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      summary:hover {
        background: #f4f5f7;
      }
      summary::-webkit-details-marker {
        display: none;
      }

      .summary-title {
        display: flex;
        align-items: center;
        gap: 6px;
        pointer-events: none;
      }
      .select-all-wrapper {
        display: flex;
        align-items: center;
        font-size: 11px;
        font-weight: 600;
        color: var(--accent-color);
        gap: 4px;
      }
      .select-all-wrapper input {
        accent-color: var(--accent-color);
        cursor: pointer;
        margin: 0;
      }

      .inner-grid {
        padding: 10px;
        border-top: 1px solid var(--border-color);
        background: #fff;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        max-height: 160px;
        overflow-y: auto;
      }

      .btn {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid transparent;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        box-sizing: border-box;
        transition: all 0.2s ease;
        margin-top: 8px;
      }
      .btn-primary {
        background-color: var(--accent-color);
        color: #ffffff;
        margin-top: 16px;
        box-shadow: 0 2px 4px rgba(0, 82, 204, 0.15);
      }
      .btn-primary:hover {
        background-color: var(--accent-hover);
        transform: translateY(-1px);
      }

      #status {
        font-size: 12px;
        font-weight: 600;
        color: var(--success-color);
        text-align: center;
        margin-top: 8px;
        min-height: 18px;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>⚡ Query Optimizer</h2>
    </div>

    <div class="form-group" style="margin-bottom: 16px">
      <select id="profileSelect" style="font-weight: 600; margin-bottom: 6px">
        <option value="profile1">Core Software Engineer</option>
        <option value="profile2">Backend & Systems</option>
        <option value="profile3">Machine Learning & AI</option>
        <option value="profile4">Custom Slate</option>
      </select>
      <input
        type="text"
        id="workspaceName"
        placeholder="Rename active workspace..."
      />
    </div>

    <div class="section-card">
      <div class="section-title">Search Precision</div>
      <div class="form-group">
        <input
          type="text"
          id="jobTitle"
          placeholder="Target Role (e.g. Backend Engineer)"
        />
      </div>

      <div class="toggle-row">
        <label
          ><input type="checkbox" id="strictTitle" /> Strict Exact Match
          (Prevents role drift)</label
        >
      </div>
      <div class="toggle-row">
        <label
          ><input type="checkbox" id="blockAgencies" checked /> Block WITCH &
          Staffing Agencies</label
        >
      </div>

      <div class="form-group" style="margin-top: 10px">
        <input
          type="text"
          id="location"
          placeholder="Location (e.g. Bengaluru, India)"
        />
      </div>
      <div class="form-group" style="margin-top: 10px">
        <select id="timeFilter">
          <option value="3600">Past 1 Hour</option>
          <option value="21600">Past 6 Hours</option>
          <option value="86400">Past 24 Hours</option>
          <option value="604800" selected>Past Week (Recommended)</option>
        </select>
      </div>
    </div>
